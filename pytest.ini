[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=long
    --html=reports/test_report.html
    --self-contained-html

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s  %(levelname)-8s  %(message)s
log_date_format = %H:%M:%S

markers =
    smoke: Fast login / navigation checks
    upload: File-upload tests