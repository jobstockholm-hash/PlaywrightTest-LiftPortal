name: LIFT Portal – UI Test Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run every weekday at 06:00 UTC (before business hours)
    - cron: "0 6 * * 1-5"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  ui-tests:
    name: Playwright Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BASE_URL:        ${{ secrets.BASE_URL }}
      ADMIN_USERNAME:  ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD:  ${{ secrets.ADMIN_PASSWORD }}
      HEADLESS:        "true"

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4

      - name: 🐍  Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦  Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🎭  Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: 🧪  Run tests
        run: |
          pytest \
            --html=reports/test_report.html \
            --self-contained-html \
            -v
        continue-on-error: true   # Always upload artifacts even on failure

      - name: 📤  Upload test report & screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            reports/
          retention-days: 30

      - name: 🔔  Notify on failure (Slack – optional)
        if: failure()
        # Uncomment and configure if you have a Slack webhook:
        # uses: slackapi/slack-github-action@v1.26.0
        # with:
        #   webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
        #   webhook-type: incoming-webhook
        #   payload: |
        #     {"text": "❌ LIFT Portal UI tests FAILED on ${{ github.ref }}"}
        run: echo "Tests failed – configure Slack webhook in secrets for notifications."
